<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bene's OmU-Suche – Rhein-Main</title>
<style>
  :root {
    --bg:        #eef2f7;
    --surface:   #ffffff;
    --surface2:  #f4f7fb;
    --border:    #c8d8eb;
    --navy:      #1e3a5f;
    --blue:      #2563eb;
    --blue-lt:   #dbeafe;
    --blue-dk:   #1d4ed8;
    --text:      #1e2a3a;
    --muted:     #64748b;
    --star:      #d97706;
    --omu-bg:    #dcfce7; --omu-tx: #166534; --omu-bd: #86efac;
    --radius:    12px;
    --shadow:    0 2px 12px rgba(37,99,235,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f2340 100%);
    color: #fff;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,.3);
    overflow: hidden;
  }
  .filmstrip {
    height: 8px;
    background: repeating-linear-gradient(
      to right,
      transparent 0px, transparent 6px,
      rgba(255,255,255,.18) 6px, rgba(255,255,255,.18) 14px,
      transparent 14px, transparent 24px
    );
    background-color: rgba(255,255,255,.07);
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: .85rem 1.25rem .9rem;
  }
  .header-branding {
    display: flex;
    align-items: center;
    gap: .65rem;
  }
  .header-icon { flex-shrink: 0; display: flex; align-items: center; }
  .header-text { display: flex; flex-direction: column; }
  .header-sub {
    font-size: .6rem;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255,255,255,.45);
    margin-bottom: .08rem;
  }
  .header-title {
    font-size: 1.22rem;
    font-weight: 800;
    letter-spacing: -.2px;
    line-height: 1.2;
    color: #fff;
  }
  .hl-blue { color: #93c5fd; }
  .hl-ehh  { color: #fff; font-style: italic; font-weight: 500; }

  /* ── Filter bar ── */
  .filter-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .55rem 1.25rem;
  }
  .filter-section {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    align-items: center;
    padding: .2rem 0;
  }
  .filter-section + .filter-section {
    border-top: 1px solid var(--border);
    margin-top: .3rem;
    padding-top: .5rem;
  }
  .filter-label {
    color: var(--muted);
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 0 0 56px;
  }

  .chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 99px;
    color: var(--muted);
    cursor: pointer;
    font-size: .78rem;
    padding: .25rem .7rem;
    transition: all .15s;
    user-select: none;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--blue); color: var(--blue); }
  .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }

  /* ── Search (subtle, below filter) ── */
  .search-wrap {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: .4rem 1.25rem;
  }
  .search-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .search-label {
    color: var(--muted);
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 0 0 56px;
  }
  #search-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: .82rem;
    padding: .3rem .65rem;
    outline: none;
    transition: border-color .2s;
  }
  #search-input::placeholder { color: var(--muted); opacity: .7; }
  #search-input:focus { border-color: var(--blue); }

  /* ── Main ── */
  main {
    max-width: 860px;
    margin: 1rem auto;
    padding: 0 1.25rem 3rem;
  }
  #status {
    color: var(--muted);
    font-size: .78rem;
    margin-bottom: .75rem;
    text-align: right;
  }

  /* ── Movie card ── */
  .movie-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: box-shadow .2s, border-color .2s;
  }
  .movie-card:hover { box-shadow: 0 4px 20px rgba(37,99,235,.13); border-color: var(--blue); }

  .poster-col {
    flex: 0 0 90px;
    width: 90px;
    background: var(--blue-lt);
    align-self: stretch;
    position: relative;
    cursor: pointer;
  }
  .poster-col img {
    display: block;
    width: 90px;
    height: 135px;
    object-fit: cover;
    object-position: center top;
  }
  .poster-placeholder {
    width: 90px;
    height: 135px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    color: var(--blue);
    opacity: .4;
  }
  /* Film-Info-Overlay beim Hover/Tap auf Poster */
  .poster-tip {
    position: absolute;
    inset: 0;
    background: rgba(10,20,40,.91);
    color: #e2e8f0;
    font-size: .62rem;
    line-height: 1.45;
    padding: .45rem .4rem;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s;
    border-radius: 0;
  }
  .poster-col:hover .poster-tip,
  .poster-col.tip-open .poster-tip {
    opacity: 1;
    pointer-events: auto;
  }
  .poster-tip .tip-plot {
    margin-bottom: .35rem;
    color: #cbd5e1;
  }
  .poster-tip .tip-label {
    color: #93c5fd;
    font-weight: 700;
    font-size: .58rem;
    letter-spacing: .3px;
    text-transform: uppercase;
    display: block;
    margin-top: .25rem;
  }
  .poster-tip .tip-val { color: #e2e8f0; }

  .card-body {
    flex: 1;
    padding: .85rem .95rem;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: .45rem;
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .movie-title {
    font-size: 1.02rem;
    font-weight: 700;
    color: var(--text);
    flex: 1 1 140px;
  }
  .imdb-inline {
    color: var(--star);
    font-size: .82rem;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
  }
  .imdb-inline:hover { text-decoration: underline; }
  .version-badge {
    border-radius: 6px;
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .4px;
    padding: .15rem .45rem;
    white-space: nowrap;
    flex-shrink: 0;
    border: 1px solid var(--omu-bd);
    background: var(--omu-bg);
    color: var(--omu-tx);
  }
  .card-meta {
    color: var(--muted);
    font-size: .78rem;
    display: flex;
    flex-wrap: wrap;
    gap: .3rem .6rem;
    align-items: center;
  }
  .cinemas-section {
    border-top: 1px solid var(--border);
    padding-top: .55rem;
    display: flex;
    flex-direction: column;
    gap: .55rem;
  }
  .cinema-row { display: flex; flex-direction: column; gap: .25rem; }
  .cinema-name {
    color: var(--blue-dk);
    font-size: .8rem;
    font-weight: 700;
    text-decoration: none;
  }
  a.cinema-name:hover { text-decoration: underline; }
  .cinema-addr {
    color: var(--muted);
    font-size: .71rem;
    display: block;
    margin-top: -.1rem;
    margin-bottom: .1rem;
  }
  .date-group { display: flex; align-items: baseline; gap: .4rem; flex-wrap: wrap; }
  .date-label {
    color: var(--muted);
    font-size: .73rem;
    font-weight: 600;
    min-width: 76px;
    flex-shrink: 0;
  }
  .time-slots { display: flex; flex-wrap: wrap; gap: .25rem; }
  .time-slot {
    background: var(--blue-lt);
    border: 1px solid #bfdbfe;
    border-radius: 6px;
    color: var(--blue-dk);
    font-size: .78rem;
    font-weight: 600;
    padding: .18rem .48rem;
    text-decoration: none;
    transition: all .15s;
    white-space: nowrap;
  }
  .time-slot:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
  .time-slot.no-link { color: var(--muted); background: var(--surface2); border-color: var(--border); border-style: dashed; }
  .time-slot.no-link:hover { background: var(--surface2); color: var(--muted); border-color: var(--border); }

  /* ── No results ── */
  #no-results {
    text-align: center; color: var(--muted); margin-top: 3rem; font-size: .95rem;
  }

  /* ── Spinner ── */
  .spinner { display: flex; justify-content: center; margin: 4rem 0; }
  .spinner::after {
    content: "";
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: var(--radius);
    color: #b91c1c;
    padding: 1rem 1.25rem;
    line-height: 1.8;
  }

  footer {
    text-align: center; color: var(--muted); font-size: .73rem; padding: 1rem;
  }
  footer a { color: var(--muted); }

  @media (max-width: 520px) {
    .header-title { font-size: 1rem; }
    .header-icon svg { width: 28px; height: 28px; }
    .poster-col { flex: 0 0 72px; width: 72px; }
    .movie-title { font-size: .92rem; }
    .filter-label, .search-label { flex: 0 0 100%; margin-bottom: -.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="filmstrip"></div>
  <div class="header-inner">
    <div class="header-branding">
      <div class="header-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Clapperboard body -->
          <rect x="3" y="13" width="30" height="20" rx="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)" stroke-width="1.8"/>
          <!-- Top slate -->
          <rect x="3" y="4" width="30" height="11" rx="2.5" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.6)" stroke-width="1.8"/>
          <!-- Diagonal stripes (black & white clapper bars) -->
          <line x1="9"  y1="4"  x2="13" y2="15" stroke="rgba(255,255,255,0.6)" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="17" y1="4"  x2="21" y2="15" stroke="rgba(255,255,255,0.6)" stroke-width="2.2" stroke-linecap="round"/>
          <line x1="25" y1="4"  x2="29" y2="15" stroke="rgba(255,255,255,0.6)" stroke-width="2.2" stroke-linecap="round"/>
          <!-- Film holes left -->
          <circle cx="7"  cy="19" r="2" fill="rgba(255,255,255,0.35)"/>
          <circle cx="7"  cy="27" r="2" fill="rgba(255,255,255,0.35)"/>
          <!-- Film holes right -->
          <circle cx="29" cy="19" r="2" fill="rgba(255,255,255,0.35)"/>
          <circle cx="29" cy="27" r="2" fill="rgba(255,255,255,0.35)"/>
          <!-- Play triangle -->
          <path d="M15 20 L15 26 L22 23 Z" fill="rgba(255,255,255,0.75)"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="header-title">
          bene's kleine <span class="hl-blue">Omi</span> <span class="hl-ehh">ehhh</span> <span class="hl-blue">OmU</span>-Suche
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Stadt + Zeitraum filter -->
<div class="filter-wrap">
  <div class="filter-section">
    <span class="filter-label">Stadt</span>
    <div id="city-chips"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Zeitraum</span>
    <div class="quick-btns" id="quick-btns" style="display:flex;gap:.4rem;flex-wrap:wrap"></div>
  </div>
</div>

<!-- Search (less prominent) -->
<div class="search-wrap">
  <div class="search-inner">
    <span class="search-label">Suche</span>
    <input id="search-input" type="search" placeholder="Film oder Kino…" autocomplete="off">
  </div>
</div>

<main>
  <div id="status"></div>
  <div id="content"><div class="spinner"></div></div>
</main>

<footer>
  Daten: <a href="https://allekinos.de" target="_blank">allekinos.de</a> &nbsp;·&nbsp;
  Bewertungen: <a href="https://www.imdb.com" target="_blank">IMDb</a> via OMDb &nbsp;·&nbsp;
  Kein Gewähr für Vollständigkeit.
</footer>

<script>
// ── Display name overrides for cities ─────────────────────────────────────
const CITY_DISPLAY = {
  'Sulzbach (Taunus)': 'Kinopolis MTZ',
};
function cityLabel(name) { return CITY_DISPLAY[name] || name; }

// ── State ──────────────────────────────────────────────────────────────────
const state = {
  data:         null,
  activeCities: new Set(),
  searchQuery:  '',
  dateFrom:     null,
  dateTo:       null,
  quickFilter:  'week',
  allCities:    [],
};

const QUICK = [
  { key: 'today',    label: 'Heute' },
  { key: 'week',     label: 'Diese Woche' },
  { key: 'nextweek', label: 'Nächste Woche' },
  { key: 'month',    label: 'Diesen Monat' },
];

// ── Utilities ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function toISO(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function todayISO() { return toISO(new Date()); }

function weekRange(offsetWeeks = 0) {
  const now = new Date();
  const dow = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + offsetWeeks * 7);
  mon.setHours(0, 0, 0, 0);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return { from: toISO(mon), to: toISO(sun) };
}

function monthRange() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const lastDay = new Date(y, m, 0).getDate();
  return {
    from: todayISO(),
    to: `${y}-${String(m).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`
  };
}

function applyQuickFilter(key) {
  state.quickFilter = key;
  if (key === 'today') {
    const t = todayISO(); state.dateFrom = t; state.dateTo = t;
  } else if (key === 'week') {
    const r = weekRange(0); state.dateFrom = r.from; state.dateTo = r.to;
  } else if (key === 'nextweek') {
    const r = weekRange(1); state.dateFrom = r.from; state.dateTo = r.to;
  } else if (key === 'month') {
    const r = monthRange(); state.dateFrom = r.from; state.dateTo = r.to;
  }
}

function isoToDisplay(iso) {
  if (!iso) return '?';
  const d = new Date(iso + 'T00:00:00');
  const days   = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]}`;
}

function runtimeStr(m) {
  if (!m) return '';
  const h = Math.floor(m / 60), min = m % 60;
  return h > 0 ? `${h}h ${min > 0 ? min + 'min' : ''}`.trim() : `${min}min`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Always hide dates before today; then apply quick-filter range
function inDateRange(iso) {
  if (!iso) return true;
  const today = todayISO();
  if (iso < today) return false;
  if (!state.dateFrom && !state.dateTo) return true;
  if (state.dateFrom && iso < state.dateFrom) return false;
  if (state.dateTo   && iso > state.dateTo)   return false;
  return true;
}

// Only show screenings at 14:00 or later (school screenings filtered out)
function isAfternoonOrEvening(time) {
  if (!time) return false;
  const h = parseInt(time.split(':')[0], 10);
  return h >= 14;
}

// ── Merge duplicate cinema entries ─────────────────────────────────────────
function mergeCinemas(cinemas) {
  const map = new Map();
  for (const c of cinemas) {
    const key = c.name.trim().toLowerCase();
    if (!map.has(key)) {
      map.set(key, { ...c, showtimes: [...c.showtimes] });
    } else {
      const existing = map.get(key);
      const seen = new Set(existing.showtimes.map(s => s.date + '|' + s.time));
      for (const st of c.showtimes) {
        const k = st.date + '|' + st.time;
        if (!seen.has(k)) { existing.showtimes.push(st); seen.add(k); }
      }
    }
  }
  return [...map.values()];
}

// ── Deduplicate showtimes within a cinema (same date+time) ────────────────
function dedupeShowtimes(showtimes) {
  const seen = new Set();
  return showtimes.filter(st => {
    const k = (st.date || '') + '|' + st.time;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
}

// ── Group showtimes by date ────────────────────────────────────────────────
function groupByDate(showtimes) {
  const groups = new Map();
  const sorted = [...showtimes].sort((a, b) => {
    const d = (a.date || '').localeCompare(b.date || '');
    return d !== 0 ? d : a.time.localeCompare(b.time);
  });
  for (const st of sorted) {
    const key = st.date || 'unbekannt';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(st);
  }
  return groups;
}

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  if (location.protocol === 'file:') throw new Error('FILE_PROTOCOL');
  const res = await fetch('data.json?v=' + Date.now());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── Render chips ───────────────────────────────────────────────────────────
function allCitiesActive() {
  return state.allCities.every(c => state.activeCities.has(c.name));
}

function renderCityChips() {
  const el = $('city-chips');
  el.style.cssText = 'display:flex;gap:.4rem;flex-wrap:wrap';
  el.innerHTML = '';

  // "Alle" chip
  const alleBtn = document.createElement('button');
  alleBtn.className = 'chip' + (allCitiesActive() ? ' active' : '');
  alleBtn.textContent = 'Alle';
  alleBtn.onclick = () => {
    state.activeCities = new Set(state.allCities.map(c => c.name));
    renderAll();
  };
  el.appendChild(alleBtn);

  for (const c of state.allCities) {
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.activeCities.has(c.name) ? ' active' : '');
    btn.textContent = cityLabel(c.name);
    btn.onclick = () => {
      if (state.activeCities.has(c.name)) {
        state.activeCities.delete(c.name);
      } else {
        state.activeCities.add(c.name);
      }
      renderAll();
    };
    el.appendChild(btn);
  }
}

function renderQuickBtns() {
  const el = $('quick-btns');
  el.innerHTML = '';
  for (const q of QUICK) {
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.quickFilter === q.key ? ' active' : '');
    btn.textContent = q.label;
    btn.onclick = () => { applyQuickFilter(q.key); renderAll(); };
    el.appendChild(btn);
  }
}

// ── Build movie card ───────────────────────────────────────────────────────
function buildMovieCard(movie) {
  const metaParts = [];
  if (movie.year)    metaParts.push(movie.year);
  if (movie.runtime) metaParts.push(runtimeStr(movie.runtime));
  if (movie.fsk)     metaParts.push(`FSK ${movie.fsk}`);
  if (movie.genres?.length) metaParts.push(movie.genres.slice(0,3).join(', '));

  const hasImdb = movie.imdb_rating && movie.imdb_rating !== 'N/A' && movie.imdb_id;
  const imdbUrl = hasImdb ? `https://www.imdb.com/title/${escHtml(movie.imdb_id)}/?language=de` : '';
  const imdbLink = hasImdb
    ? ` <a class="imdb-inline" href="${imdbUrl}" target="_blank">(IMDb: ${escHtml(movie.imdb_rating)})</a>`
    : '';

  const titleHtml = `${escHtml(movie.title)}${imdbLink}`;

  const merged = mergeCinemas(movie.cinemas || []);
  let cinemaHtml = '';

  for (const cinema of merged) {
    const relevantSts = dedupeShowtimes(
      cinema.showtimes.filter(st => inDateRange(st.date) && isAfternoonOrEvening(st.time))
    );
    if (!relevantSts.length) continue;

    const groups = groupByDate(relevantSts);
    let dateGroupsHtml = '';
    for (const [dateKey, sts] of groups) {
      const dateLabel = dateKey === 'unbekannt' ? '' : isoToDisplay(dateKey);
      const timesHtml = sts.map(st => {
        if (st.url)
          return `<a class="time-slot" href="${escHtml(st.url)}" target="_blank">${escHtml(st.time)}</a>`;
        return `<span class="time-slot no-link">${escHtml(st.time)}</span>`;
      }).join('');
      dateGroupsHtml += `
        <div class="date-group">
          <span class="date-label">${escHtml(dateLabel)}</span>
          <div class="time-slots">${timesHtml}</div>
        </div>`;
    }

    // Cinema name + address as Google Maps link
    const mapsQuery = encodeURIComponent((cinema.name + ' ' + (cinema.address || '') + ' ' + (cinema.city || '')).trim());
    const mapsUrl   = `https://www.google.com/maps/search/?api=1&query=${mapsQuery}`;
    const nameHtml  = `<a class="cinema-name" href="${mapsUrl}" target="_blank">${escHtml(cinema.name)}</a>`;
    const addrHtml  = cinema.address ? `<span class="cinema-addr">${escHtml(cinema.address)}</span>` : '';

    cinemaHtml += `
      <div class="cinema-row">
        ${nameHtml}${addrHtml}
        ${dateGroupsHtml}
      </div>`;
  }

  if (!cinemaHtml) return '';

  // Poster overlay: always show; use OMDb data if available, else genres/year/runtime
  const plotShort = movie.plot ? movie.plot.slice(0, 130) + (movie.plot.length > 130 ? '…' : '') : '';
  const fallbackInfo = [
    movie.genres?.length ? movie.genres.join(', ') : '',
    movie.year || '',
    movie.runtime ? runtimeStr(movie.runtime) : '',
  ].filter(Boolean).join(' · ');

  const tipHtml = `
    <div class="poster-tip">
      ${plotShort
        ? `<p class="tip-plot">${escHtml(plotShort)}</p>`
        : (fallbackInfo ? `<p class="tip-plot">${escHtml(fallbackInfo)}</p>` : '')}
      ${movie.director ? `<span class="tip-label">Regie</span><span class="tip-val">${escHtml(movie.director)}</span>` : ''}
      ${movie.actors   ? `<span class="tip-label">Darsteller</span><span class="tip-val">${escHtml(movie.actors.split(',').slice(0,3).join(', '))}</span>` : ''}
    </div>`;

  const posterHtml = movie.poster
    ? `<img src="${escHtml(movie.poster)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  return `
    <div class="movie-card">
      <div class="poster-col" onclick="this.classList.toggle('tip-open')" title="Tippen für Filminfos">
        ${posterHtml}
        <div class="poster-placeholder" ${movie.poster ? 'style="display:none"' : ''}>🎬</div>
        ${tipHtml}
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="movie-title">${titleHtml}</div>
          <span class="version-badge">OmU</span>
        </div>
        <div class="card-meta">${escHtml(metaParts.join(' · '))}</div>
        <div class="cinemas-section">${cinemaHtml}</div>
      </div>
    </div>`;
}

// ── Main render ────────────────────────────────────────────────────────────
function renderAll() {
  renderCityChips();
  renderQuickBtns();

  const data = state.data;
  let html = '', count = 0;

  for (const cityObj of state.allCities) {
    if (!state.activeCities.has(cityObj.name)) continue;
    const cityData = data.cities[cityObj.name];
    if (!cityData) continue;
    for (const movie of (cityData.movies || [])) {
      if (state.searchQuery.length >= 2) {
        const q = state.searchQuery.toLowerCase();
        if (!movie.title.toLowerCase().includes(q) &&
            !(movie.cinemas||[]).some(c => c.name.toLowerCase().includes(q))) continue;
      }
      const card = buildMovieCard(movie);
      if (card) { html += card; count++; }
    }
  }

  if (!html) {
    html = `<div id="no-results">Keine Vorstellungen für die gewählten Filter gefunden.</div>`;
  }

  $('content').innerHTML = html;

  const ts = new Date(data.generated_at);
  const tsStr = ts.toLocaleString('de-DE', { day:'numeric', month:'numeric', hour:'2-digit', minute:'2-digit' });
  $('status').textContent = `Stand: ${tsStr} Uhr · ${count} Film${count !== 1 ? 'e' : ''} angezeigt`;
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  let data;
  try {
    data = await loadData();
  } catch(e) {
    $('content').innerHTML = e.message === 'FILE_PROTOCOL' ? `
      <div class="error-box">
        <strong>📂 Lokale Datei – kein direktes Öffnen möglich</strong><br><br>
        Browser erlauben aus Sicherheitsgründen kein Laden von <code>data.json</code> via <code>file://</code>.<br><br>
        → Dateien auf <strong>GitHub Pages</strong> deployen (siehe SETUP.md).<br>
        <em>Oder lokal:</em> <code>python3 -m http.server 8080</code> im Projektordner, dann
        <a href="http://localhost:8080">http://localhost:8080</a> öffnen.
      </div>` : `
      <div class="error-box">
        <strong>⚠ Daten nicht verfügbar</strong><br>${escHtml(e.message)}
      </div>`;
    return;
  }

  state.data = data;

  // City list — Wiesbaden only as default
  const req = [], opt = [];
  for (const [name, d] of Object.entries(data.cities)) {
    (d.optional ? opt : req).push({ name, optional: !!d.optional });
  }
  state.allCities = [...req, ...opt];
  // Only Wiesbaden preselected
  state.activeCities = new Set(['Wiesbaden']);

  applyQuickFilter('week');

  $('search-input').addEventListener('input', e => {
    state.searchQuery = e.target.value.trim();
    renderAll();
  });

  renderAll();
}

init();
</script>
